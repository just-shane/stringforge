<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="string-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arrow-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="246" fill="#0c0e14" stroke="url(#bow-grad)" stroke-width="4"/>

  <!-- Bow limb - curved arc on the left side -->
  <path
    d="M 170 80 Q 70 256 170 432"
    fill="none"
    stroke="url(#bow-grad)"
    stroke-width="18"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Bow limb tips (wider ends) -->
  <circle cx="170" cy="80" r="8" fill="#60a5fa"/>
  <circle cx="170" cy="432" r="8" fill="#3b82f6"/>

  <!-- Bowstring -->
  <line
    x1="170" y1="80"
    x2="170" y2="432"
    stroke="url(#string-grad)"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- String pulled back (drawn position hint) -->
  <path
    d="M 170 80 L 280 256 L 170 432"
    fill="none"
    stroke="url(#string-grad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.5"
    stroke-dasharray="8 6"
  />

  <!-- Arrow shaft -->
  <line
    x1="280" y1="256"
    x2="440" y2="256"
    stroke="url(#arrow-grad)"
    stroke-width="5"
    stroke-linecap="round"
    filter="url(#arrow-glow)"
  />

  <!-- Arrow point (broadhead shape) -->
  <polygon
    points="440,256 460,246 460,266"
    fill="#f0f9ff"
    filter="url(#arrow-glow)"
  />

  <!-- Arrow fletching (3 vanes at nock end) -->
  <line x1="285" y1="256" x2="300" y2="240" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="290" y1="256" x2="305" y2="272" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="280" y1="256" x2="295" y2="256" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Speed lines / energy trails behind arrow -->
  <line x1="340" y1="248" x2="380" y2="248" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="350" y1="264" x2="395" y2="264" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="330" y1="256" x2="410" y2="256" stroke="#60a5fa" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- Spark/forge accent at arrow tip -->
  <circle cx="460" cy="256" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="465" cy="250" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="466" cy="262" r="1.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="470" cy="254" r="1" fill="#fde68a" opacity="0.7"/>
</svg>
